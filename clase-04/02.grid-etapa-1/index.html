    <h1>Grid Etapa 1</h1>

  <!-- 
      Grid es un sistema de diseño bidimensional en CSS que permite crear diseños complejos y estructurados en una pagina web. Es una forma mucho mas poderosa de controlar la ubicacion y el diseño de los elementos HTML en una cuadricula. A diferencia de Flexbox. Sistema unidimensional. CSS Grid ofrece una mayor flexiblidad y control sobre los elementos dentro de un documento html.
     -->
    <!-- https://cssgridgenerator.io/ -->
     <!-- .contenedor>.elemento.elm${$}*24 -->
     <div class="contenedor"> <!-- PADRE -->
      <div class="elemento elm1">1</div> <!-- HIJO -->

      <div class="elemento elm3">3</div>
